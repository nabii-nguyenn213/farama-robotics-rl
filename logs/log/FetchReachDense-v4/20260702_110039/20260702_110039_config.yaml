env:
  name: FetchReachDense-v4
  max_episode_steps: 0
  reward_scaler: 1.0
  flatten_obs: true
  kwargs: {}
train:
  run_name: SAC_FetchReachDense-v4
  total_timesteps: 200000
  memory_size: 1000000
  batch_size: 256
  optimizer:
    name: Adam
    actor_lr: 0.0003
    critic_lr: 0.0003
    alpha_lr: 0.0003
  learning_start: 5000
  tau: 0.005
  gamma: 0.98
  auto_alpha: true
  target_entropy: auto
  alpha: 0.2
  show_tb: true
  device: auto
  hidden_size_actor:
  - 256
  - 256
  hidden_size_critic:
  - 256
  - 256
  seed: 42
  gradient_step: 1
eval:
  eval_every: 5000
  save_every: 5000
  log_every: 500
  eval_episodes: 10
dir:
  root: .
  log: ./logs/log/FetchReachDense-v4
  ckpt: ./results/checkpoints/FetchReachDense-v4
  model: ./results/models/FetchReachDense-v4
  best: ./results/best/FetchReachDense-v4
  tensorboard: ./logs/tensorboard_logs/FetchReachDense-v4
